version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://testuser:***@dev-postgres:5432/playground_db?sslmode=disable"
    networks:
      - tasklist_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080/api/v1"
    depends_on:
      - backend
    networks:
      - tasklist_network
    restart: unless-stopped

networks:
  tasklist_network:
    external: true
    name: postgres-db_default
